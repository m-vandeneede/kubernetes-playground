image:
  pullPolicy: Always

global:
  checkNewVersion: false
  sendAnonymousUsage: false

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"
  - "--api.insecure=true"

#tlsStore:
#  default:
#    defaultCertificate:
#      secretName: vandeneede-org-production-tls

deployment:
  enabled: true
  replicas: 2

ports:
  web:
    port: 8000
    protocol: TCP
    expose:
      default: true
    exposedPort: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    asDefault: true
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    http:
      tls:
        enabled: true

providers:
  kubernetesCRD:
    enabled: true
    ingressClass: external
  kubernetesIngress:
    enabled: true
    ingressClass: external
    publishedService:
      enabled: true

ingressClass:  # @schema additionalProperties: false
  # -- Create a default IngressClass for Traefik
  enabled: true
  isDefaultClass: false
  name: external

service:
  enabled: true
  type: LoadBalancer
  annotations:
    metallb.io/loadBalancerIPs: 10.71.0.11