apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
spec:
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: immich
      release: immich
  template:
    metadata:
      labels:
        app: immich
        release: immich
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        # --- General ---
        - image: ghcr.io/immich-app/immich-server:v2
          imagePullPolicy: IfNotPresent
          name: immich

          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          env:
            - name: DB_HOSTNAME
              value: postgres.databases.svc.cluster.local
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: db-password
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis.immich.svc.cluster.local
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-ml.immich.svc.cluster.local:3003
            - name: IMMICH_PORT
              value: "2283"
          # ---------------

          # --- Network ---
          ports:
            - containerPort: 2283
              name: http
              protocol: TCP
          # ---------------

          # --- Mounts ---
          volumeMounts:
            - mountPath: /data
              name: data

          # ---------------
      volumes:
        - name: data
          nfs:
            server: 192.168.100.40
            path: "/volume2/Immich"
