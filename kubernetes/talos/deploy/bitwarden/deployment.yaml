apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden
spec:
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: bitwarden
      release: bitwarden
  template:
    metadata:
      labels:
        app: bitwarden
        release: bitwarden
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: bitwarden
          image: vaultwarden/server:latest
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          env:
            - name: ROCKET_PORT
              value: "8080"
            - name: SIGNUPS_ALLOWED
              value: "true"
            - name: SIGNUPS_VERIFY
              value: "true"
            - name: REQUIRE_DEVICE_EMAIL
              value: "true"
            - name: INVITATIONS_ALLOWED
              value: "true"
            - name: SHOW_PASSWORD_HINT
              value: "false"
            - name: WEBSOCKET_ENABLED
              value: "true"
            - name: WEB_VAULT_ENABLED
              value: "true"
            - name: SENDS_ALLOWED
              value: "true"
            - name: ORG_CREATION_USERS
              value: all
            - name: ENABLE_DB_WAL
              value: "true"
            - name: DOMAIN
              value: https://password.vandeneede.org
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  key: admin-token
                  name: bitwarden-secrets
            - name: EMERGENCY_ACCESS_ALLOWED
              value: "true"
            - name: SMTP_HOST
              value: smtp.protonmail.ch
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  key: smtp-user
                  name: bitwarden-secrets
            - name: SMTP_FROM_NAME
              value: Password Manager
            - name: SMTP_SECURITY
              value: starttls
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_AUTH_MECHANISM
              value: Login
            - name: SMTP_TIMEOUT
              value: "15"
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  key: smtp-user
                  name: bitwarden-secrets
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: smtp-password
                  name: bitwarden-secrets

          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 3012
              name: websocket
              protocol: TCP

          volumeMounts:
            - mountPath: /data
              name: bitwarden

      volumes:
        - name: bitwarden
          persistentVolumeClaim:
            claimName: bitwarden
