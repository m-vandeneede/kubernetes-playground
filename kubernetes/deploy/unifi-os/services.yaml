apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/allow-shared-ip: unifi-svc
  name: unifi-tcp
spec:
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ports:
  - name: communication
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: mobile-speedtest
    port: 6789
    protocol: TCP
    targetPort: 6789
  selector:
    name: unifi-os
  type: LoadBalancer
  loadBalancerIP: 192.168.100.52
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.universe.tf/allow-shared-ip: unifi-svc
  name: unifi-udp
spec:
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ports:
  - name: stun
    port: 3478
    protocol: UDP
    targetPort: 3478
  - name: syslog
    port: 5514
    protocol: UDP
    targetPort: 5514
  - name: discovery
    port: 10003
    protocol: UDP
    targetPort: 10003
  selector:
    name: unifi-os
  type: LoadBalancer
  loadBalancerIP: 192.168.100.52
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-web
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: webui
    port: 443
    protocol: TCP
    targetPort: 443
  selector:
    name: unifi-os
  type: ClusterIP